<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Wells</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
 
    <style>
        body {
            font-family: Arial;
            margin: 60px;
        }

        h1 {
            text-align: center;
        }

        .section {
            margin-bottom: 30px;
        }

        input, select, button {
            padding: 8px;
            margin-top: 5px;
        }

        canvas {
            width: 100%;
            height: 500px;
        }

        /* Layout for chart + menu */
        .chart-container {
            width: 90%;
            margin: auto;
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        /* Critical panel */
        .side-panel {
            width: 250px;
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
        }

        /* Dropdown styling */
        details {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            width: 300px;
            margin: auto;
        }

        summary {
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

{% include 'navbar.html' %} 

<h1>Your Wells</h1>

<!-- SELECT WELL -->
<div class="section">
    <form method="GET">
        <label><strong>Select Well:</strong></label><br>

        <select name="well" onchange="this.form.submit()">
            <option value="">All Wells</option>

            {% for well in wells %}
                <option value="{{ well.well_id }}"
                    {% if selected_well and selected_well.well_id == well.well_id %}
                        selected
                    {% endif %}
                >
                    {{ well.name }} (Depth: {{ well.depth }})
                </option>
            {% endfor %}
        </select>
    </form>
</div>

<!-- CREATE WELL -->
<div class="section">
    <details>
        <summary>➕ Create New Well</summary>

        <div style="margin-top: 15px;">
            <form method="POST" action="new_well/">
                {% csrf_token %}

                <input type="text" name="name" placeholder="Well name" required><br><br>
                <input type="number" step="0.1" name="depth" placeholder="Depth" required><br><br>

                <button type="submit">Create Well</button>
            </form>
        </div>
    </details>
</div>

<hr>

<!-- CHART + SIDE MENU -->
<div class="chart-container">

    <!-- GRAPH -->
    <div style="flex: 3;">
        <canvas id="wellChart"></canvas>
    </div>

    <!-- CRITICAL SETTINGS -->
    <div class="side-panel">
        <h4>⚠️ Critical Level</h4>

        <input type="number" id="criticalInput" placeholder="Enter value" style="width: 100%;"><br><br>

        <button onclick="updateCritical()">Apply</button>
    </div>

</div>

<script>
    const labels = JSON.parse('{{ labels|escapejs }}');
    const data = JSON.parse('{{ data|escapejs }}');

    const maxDepth = Number('{{ selected_well.depth|default:"100" }}');
    const chartMax = maxDepth * 1.05;

    const ctx = document.getElementById('wellChart').getContext('2d');

    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'Water Level',
                    data: data,
                    borderColor: 'blue',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 4
                },
                {
                    label: 'Critical Level',
                    data: [],
                    borderColor: 'red',
                    borderWidth: 2,
                    borderDash: [5, 5],
                    pointRadius: 0
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            layout: {
                padding: {
                    top: 10
                }
            },
            scales: {
                y: {
                    min: 0,
                    max: chartMax,
                    title: {
                        display: true,
                        text: 'Water Level'
                    }
                },
                x: {
                    title: {
                        display: true,
                        text: 'Time'
                    }
                }
            }
        }
    });

    function updateCritical() {
        const input = document.getElementById('criticalInput').value;
        const criticalValue = Number(input);

        if (isNaN(criticalValue)) return;

        const criticalLine = labels.map(() => criticalValue);

        chart.data.datasets[1].data = criticalLine;
        chart.update();
    }
</script>

</body>
</html>
