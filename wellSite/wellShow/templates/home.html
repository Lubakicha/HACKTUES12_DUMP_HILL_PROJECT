<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Wells</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 60px;
        }

        h1 {
            text-align: center;
        }

        .section {
            margin-bottom: 30px;
        }

        input, select, button {
            padding: 8px;
            margin-top: 5px;
        }

        canvas {
            max-width: 1000px;
            display: block;
            margin: auto;
        }
    </style>
</head>
<body>

<h1>Your Wells</h1>

<!-- 🔽 SELECT WELL -->
<div class="section">
    <form method="GET">
        <label><strong>Select Well:</strong></label><br>

        <select name="well" onchange="this.form.submit()">
            <option value="">All Wells</option>

            {% for well in wells %}
                <option value="{{ well.well_id }}"
                    {% if selected_well and selected_well.well_id == well.well_id %}
                        selected
                    {% endif %}
                >
                    {{ well.name }} (Depth: {{ well.depth }})
                </option>
            {% endfor %}

        </select>
    </form>
</div>

<!-- ➕ CREATE WELL -->
<div class="section">
    <h3>Create New Well</h3>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="name" placeholder="Well name" required><br><br>
        <input type="number" step="0.1" name="depth" placeholder="Depth" required><br><br>

        <button type="submit">Create Well</button>
    </form>
</div>

<hr>

<!-- 📊 CHART -->
<canvas id="wellChart"></canvas>

<script>
    const labels = JSON.parse('{{ labels|escapejs }}');
    const data = JSON.parse('{{ data|escapejs }}');

    const ctx = document.getElementById('wellChart').getContext('2d');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Water Level',
                data: data,
                borderColor: 'blue',
                fill: true
            }]
        }
    });
</script>

</body>
</html>
