<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Wells</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: Arial; margin: 60px; }
        h1 { text-align: center; }
        .section { margin-bottom: 30px; }

        input, select, button {
            padding: 8px;
            margin-top: 5px;
        }

        canvas {
            width: 100%;
            height: 500px;
        }

        .chart-container {
            width: 90%;
            margin: auto;
            display: flex;
            gap: 30px;
        }

        .side-panel {
            width: 250px;
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
        }

        details {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            width: 300px;
            margin: auto;
        }
    </style>
</head>

<body>

{% include 'navbar.html' %}

<h1>Your Wells</h1>

<div style="text-align: center; margin-bottom: 20px;">
    <a href="{% url 'inbox' %}" style="
        background: #007bff;
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: bold;">
        📥 Inbox
    </a>
</div>

<!-- SELECT WELL -->
<div class="section">
    <form method="GET">
        <label><strong>Select Well:</strong></label><br>

        <select name="well" onchange="this.form.submit()">
            <option value="">All Wells</option>

            {% for well in wells %}
                <option value="{{ well.device_id }}"
                    {% if request.GET.well == well.device_id %}
                        selected
                    {% endif %}
                >
                    {{ well.name }} (Depth: {{ well.depth }})
                </option>
            {% endfor %}
        </select>
    </form>
</div>

<!-- CREATE WELL -->
<div class="section">
    <details>
        <summary>➕ Create New Well</summary>

        <form method="POST" action="new_well/">
            {% csrf_token %}
            <input type="text" name="name" placeholder="Well name" required><br><br>
            <input type="number" step="0.1" name="depth" placeholder="Depth (m)" required><br><br>
            <input type="number" step="0.01" name="radius" placeholder="Radius (m)" required><br><br>
            <input type="text" name="device_id" placeholder="Device ID (5 chars)" maxlength="5" required><br><br>
            <button type="submit">Create Well</button>
        </form>
    </details>
</div>

<hr>

<div class="chart-container">

    <div style="flex: 3;">
        <canvas id="wellChart"></canvas>
    </div>

    <div class="side-panel">
        <h4>⚠️ Critical Level</h4>
        <input type="number" id="criticalInput" placeholder="Enter value"><br><br>
        <button onclick="updateCritical()">Apply</button>

        <p id="litersInfo" style="margin-top:15px; font-weight:bold;"></p>
    </div>

</div>

<!-- 🚨 POPUP -->
<div id="alertPopup" style="
    display:none;
    position:fixed;
    top:20px;
    right:20px;
    background:red;
    color:white;
    padding:20px;
    border-radius:10px;
    z-index:9999;
">
    <div style="display:flex; justify-content:space-between;">
        <strong>⚠️ Alert</strong>
        <button onclick="closePopup()" style="
            background:none;
            border:none;
            color:white;
            font-size:18px;
            cursor:pointer;
        ">✖</button>
    </div>
    <div id="alertText"></div>
</div>

<script>
    const labels = JSON.parse('{{ labels|escapejs }}');
    const data = JSON.parse('{{ data|escapejs }}');

    const maxDepth = Number('{{ selected_well.depth|default:"" }}');
    const wellRadius = Number('{{ selected_well.radius|default:"" }}');
    const savedCritical = JSON.parse('{{ selected_well.critical_level|default:"null" }}');
    const isCritical = "{{ is_critical|yesno:'true,false' }}" === "true";

    const chartMax = maxDepth ? maxDepth * 1.05 : null;

    function getCSRF() {
        return document.cookie.split('; ')
            .find(row => row.startsWith('csrftoken'))
            ?.split('=')[1];
    }

    const ctx = document.getElementById('wellChart').getContext('2d');

    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'Water Level',
                    data: data,
                    borderColor: 'blue',
                    fill: true,
                    tension: 0.3
                },
                {
                    label: 'Critical',
                    data: [],
                    borderColor: 'red',
                    borderDash: [5,5],
                    pointRadius: 0
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    min: 0,
                    max: chartMax
                }
            }
        }
    });

    function updateCritical() {
        const val = Number(document.getElementById('criticalInput').value);
        if (isNaN(val)) return;

        const selectedWell = new URLSearchParams(window.location.search).get('well');

        fetch(`/set-critical/?well=${selectedWell}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCSRF()
            },
            body: JSON.stringify({ critical: val })
        }).then(() => {
            chart.data.datasets[1].data = labels.map(() => val);
            chart.update();
            updateLitersInfo(val);
        });
    }

    function updateLitersInfo(criticalVal = savedCritical) {
        const info = document.getElementById('litersInfo');

        if (data.length === 0) {
            info.innerText = "No data yet.";
            return;
        }

        const latestLevel = data[data.length - 1];
        const radiusMeters = wellRadius > 10 ? wellRadius / 100 : wellRadius;

        let volume = Math.PI * radiusMeters * radiusMeters * latestLevel;
        let liters = volume / 1000;

        if (criticalVal !== null && latestLevel < criticalVal) {
            info.innerText = `⚠️ Below critical! Water left: ${liters.toFixed(2)} liters`;
        } else {
            info.innerText = `💧 Current water: ${liters.toFixed(2)} liters`;
        }
    }

    function showPopup(message) {
        const popup = document.getElementById('alertPopup');
        const text = document.getElementById('alertText');

        text.innerText = message;
        popup.style.display = 'block';

        localStorage.setItem("popupVisible", "true");
        localStorage.setItem("popupMessage", message);
    }

    function closePopup() {
        document.getElementById('alertPopup').style.display = 'none';

        localStorage.removeItem("popupVisible");
        localStorage.removeItem("popupMessage");
    }

    window.onload = function () {

        // 🔁 RESTORE POPUP
        const savedPopup = localStorage.getItem("popupVisible");
        const savedMessage = localStorage.getItem("popupMessage");

        if (savedPopup === "true") {
            showPopup(savedMessage);
        }

        if (savedCritical !== null) {
            document.getElementById('criticalInput').value = savedCritical;
            chart.data.datasets[1].data = labels.map(() => savedCritical);
            chart.update();
        }

        updateLitersInfo();

        // 🚨 TRIGGER
        if (isCritical) {
            if (!localStorage.getItem("popupVisible")) {
                showPopup("⚠️ Critical water level reached!");
            }
        } else {
            localStorage.removeItem("popupVisible");
            localStorage.removeItem("popupMessage");
        }
    };
    let lastTimestamp = null;

function checkForUpdates() {
    fetch('/check-new-data/')
        .then(res => res.json())
        .then(data => {

            if (!data.timestamp) return;

            if (lastTimestamp === null) {
                lastTimestamp = data.timestamp;
                return;
            }

            if (data.timestamp !== lastTimestamp) {
                window.location.reload();
            }
        });
}

// check every 5 seconds
setInterval(checkForUpdates, 5000);
    // 🔁 AUTO RELOAD


</script>

</body>
</html>
