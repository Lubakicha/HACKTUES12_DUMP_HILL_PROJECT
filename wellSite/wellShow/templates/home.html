<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Wells</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
 
    <style>
        body {
            font-family: Arial;
            margin: 60px;
        }

        h1 {
            text-align: center;
        }

        .section {
            margin-bottom: 30px;
        }

        input, select, button {
            padding: 8px;
            margin-top: 5px;
        }

        canvas {
            width: 100%;
            height: 500px;
        }

        .chart-container {
            width: 90%;
            margin: auto;
            display: flex;
            gap: 30px;
        }

        .side-panel {
            width: 250px;
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
        }

        details {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            width: 300px;
            margin: auto;
        }

        /* Modal */
        #unknownWellModal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        #unknownWellModal div {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
        }
    </style>
</head>
<body>

{% include 'navbar.html' %}

<h1>Your Wells</h1>
<div style="text-align: center; margin-bottom: 20px;">
    <a href="{% url 'inbox' %}" style="
        background: #007bff;
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: bold;
    ">
        📥 Inbox
    </a>
</div>
<!-- SELECT WELL -->
<div class="section">
    <form method="GET">
        <label><strong>Select Well:</strong></label><br>

        <select name="well" onchange="this.form.submit()">
            <option value="">All Wells</option>

            {% for well in wells %}
                <option value="{{ well.well_id }}"
                    {% if selected_well and selected_well.well_id == well.well_id %}
                        selected
                    {% endif %}
                >
                    {{ well.name }} (Depth: {{ well.depth }})
                </option>
            {% endfor %}
        </select>
    </form>
</div>

<!-- CREATE WELL -->
<div class="section">
    <details>
        <summary>➕ Create New Well</summary>

        <form method="POST" action="new_well/">
            {% csrf_token %}
            <input type="text" name="name" placeholder="Well name" required><br><br>
            <input type="number" step="0.1" name="depth" placeholder="Depth" required><br><br>
            <button type="submit">Create Well</button>
        </form>
    </details>
</div>

<hr>

<!-- CHART + MENU -->
<div class="chart-container">

    <div style="flex: 3;">
        <canvas id="wellChart"></canvas>
    </div>

    <div class="side-panel">
        <h4>⚠️ Critical Level</h4>
        <input type="number" id="criticalInput" placeholder="Enter value"><br><br>
        <button onclick="updateCritical()">Apply</button>
    </div>

</div>

<!-- UNKNOWN WELL MODAL -->
<div id="unknownWellModal">
    <div>
        <h3>Unknown Well</h3>
        <p id="unknownText"></p>

        <input type="text" id="newWellName" placeholder="Well name"><br><br>
        <input type="number" id="newWellDepth" placeholder="Depth"><br><br>

        <button onclick="createNewWell()">Create</button>
        <button onclick="closeModal()">Ignore</button>
    </div>
</div>

<script>
    const labels = JSON.parse('{{ labels|escapejs }}');
    const data = JSON.parse('{{ data|escapejs }}');

    const maxDepth = Number('{{ selected_well.depth|default:"100" }}');
    const chartMax = maxDepth * 1.05;

    const ctx = document.getElementById('wellChart').getContext('2d');

    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'Water Level',
                    data: data,
                    borderColor: 'blue',
                    fill: true,
                    tension: 0.3
                },
                {
                    label: 'Critical',
                    data: [],
                    borderColor: 'red',
                    borderDash: [5,5],
                    pointRadius: 0
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    min: 0,
                    max: chartMax
                }
            }
        }
    });

    function updateCritical() {
        const val = Number(document.getElementById('criticalInput').value);
        if (isNaN(val)) return;

        chart.data.datasets[1].data = labels.map(() => val);
        chart.update();
    }

    // 🔴 Unknown well handling
    let pendingWell = null;

    function handleResponse(res) {
        if (res.status === 'unknown_well') {
            pendingWell = res;

            document.getElementById('unknownText').innerText =
                "Well ID " + res.well_id + " not found.";

            document.getElementById('unknownWellModal').style.display = 'flex';
        }
    }

    function createNewWell() {
        const name = document.getElementById('newWellName').value;
        const depth = document.getElementById('newWellDepth').value;

        fetch('new_well/', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `name=${name}&depth=${depth}`
        }).then(() => {
            closeModal();
            location.reload();
        });
    }

    function closeModal() {
        document.getElementById('unknownWellModal').style.display = 'none';
    }
</script>

</body>
</html>
